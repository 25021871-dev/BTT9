name: PR Code Review CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run tests
        run: mvn clean test

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle

      - name: Post Checkstyle Report
        uses: dbelyaev/action-checkstyle@v0.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_results: target/checkstyle-result.xml
